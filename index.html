<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🎨 藝術提示生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        a, button {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e8e8e8;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .lang-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 8px 20px;
            min-height: 44px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .lang-btn.active {
            background: rgba(254, 202, 87, 0.2);
            border-color: #feca57;
            color: #feca57;
        }
        
        .prompt-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .prompt-box:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .category {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #48dbfb;
            margin-bottom: 15px;
        }
        
        .prompt {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        
        .hint {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            border: none;
            color: #1a1a2e;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }
        
        .generate-btn:active {
            transform: translateY(0);
        }
        
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 8px 16px;
            min-height: 40px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background: rgba(72, 219, 251, 0.2);
            border-color: #48dbfb;
            color: #48dbfb;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .favorites {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .favorites h3 {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .fav-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .fav-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .fav-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .fav-item span {
            color: #666;
            font-size: 0.75rem;
        }
        
        .delete-fav {
            color: #ff6b6b;
            cursor: pointer;
            padding: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .fav-item:hover .delete-fav {
            opacity: 1;
        }
        
        .save-btn {
            background: transparent;
            border: 1px solid #feca57;
            color: #feca57;
            padding: 8px 20px;
            min-height: 44px;
            border-radius: 20px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .timestamp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #444;
            font-size: 0.75rem;
        }
        
        .footer-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .footer-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #e8e8e8;
            transform: translateY(-2px);
        }
        .footer-link svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .footer-link:hover svg {
            filter: drop-shadow(0 0 8px rgba(225, 48, 108, 0.6));
        }
        
        /* 手機版優化 */
        @media (max-width: 480px) {
            body { padding: 16px; }
            h1 { font-size: 1.8rem; }
            .prompt-box {
                padding: 24px 20px;
                min-height: 180px;
            }
            .prompt { font-size: 1.25rem; }
            .generate-btn { padding: 16px 36px; font-size: 1.1rem; }
            .delete-fav { opacity: 1; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
            .favorites { margin-bottom: 80px; }
            .timestamp, .footer-link {
                bottom: max(16px, env(safe-area-inset-bottom));
            }
            .footer-link { left: 16px; padding: 10px 14px; }
            .timestamp { right: 16px; font-size: 0.7rem; }
        }
        
        @media (max-width: 360px) {
            h1 { font-size: 1.5rem; }
            .filter-btn { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>

                generateBtn: '✨ 生成',
                saveBtn: '★ 收藏',
                favoritesTitle: '★ 收藏列表',
                timestampLabel: '香港時間:'
            },
            en: {
                title: '🎨 Art Prompt Generator',
                subtitle: 'Spark creativity for your next piece',
                defaultCategory: 'Click to generate',
                defaultPrompt: 'Click the button below to spark creativity',
                generateBtn: '✨ Generate',
                saveBtn: '★ Save',
                favoritesTitle: '★ Favorites',
                timestampLabel: 'HK Time:'
            }
        };
        
        function generatePrompt() {
            const langData = prompts[currentLang];
            let allPrompts = [];
            
            if (currentFilter === 'all') {
                Object.values(langData).forEach(cat => {
                    allPrompts = allPrompts.concat(cat);
                });
            } else {
                allPrompts = langData[currentFilter] || [];
            }
            
            const random = allPrompts[Math.floor(Math.random() * allPrompts.length)];
            
            const filterKeys = Object.keys(langData);
            const displayFilter = currentFilter === 'all' 
                ? filterKeys[Math.floor(Math.random() * filterKeys.length)]
                : currentFilter;
            
            document.getElementById('category').textContent = filterNames[currentLang][displayFilter].toUpperCase();
            document.getElementById('prompt').textContent = random.text;
            document.getElementById('hint').textContent = random.hint;
            
            // Animation
            const box = document.querySelector('.prompt-box');
            box.style.transform = 'scale(0.95)';
            setTimeout(() => {
                box.style.transform = 'scale(1)';
            }, 150);
        }
        
        // Language toggle
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateFilterLabels();
                updateUILabels();
                if (!isPlaceholderState()) generatePrompt();
            });
        });
        
        function updateFilterLabels() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const filter = btn.dataset.filter;
                btn.textContent = filterNames[currentLang][filter];
            });
        }
        
        function isPlaceholderState() {
            const prompt = document.getElementById('prompt').textContent;
            return prompt === uiStrings.zh.defaultPrompt || prompt === uiStrings.en.defaultPrompt;
        }
        
        function updateUILabels() {
            const u = uiStrings[currentLang];
            document.getElementById('pageTitle').textContent = u.title;
            document.getElementById('pageSubtitle').textContent = u.subtitle;
            document.getElementById('generateBtn').textContent = u.generateBtn;
            document.getElementById('saveBtn').textContent = u.saveBtn;
            document.getElementById('favoritesTitle').textContent = u.favoritesTitle;
            document.getElementById('timestampLabel').textContent = u.timestampLabel;
            if (isPlaceholderState()) {
                document.getElementById('category').textContent = u.defaultCategory;
                document.getElementById('prompt').textContent = u.defaultPrompt;
            }
        }
        
        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
            });
        });
        
        // Favorites - store { text, hint } for both prompt and hint
        function loadFavorites() {
            const favs = JSON.parse(localStorage.getItem('artPromptFavs') || '[]');
            const list = document.getElementById('favList');
            list.innerHTML = '';
            
            favs.forEach((fav, index) => {
                const text = typeof fav === 'string' ? fav : fav.text;
                const hint = typeof fav === 'string' ? '' : (fav.hint || '');
                const displayText = hint ? `${text}<br><small style="color:#666;font-size:0.85em">${hint}</small>` : text;
                
                const item = document.createElement('div');
                item.className = 'fav-item';
                item.innerHTML = `
                    <span>${displayText}</span>
                    <span class="delete-fav" onclick="deleteFav(${index})">✕</span>
                `;
                item.onclick = (e) => {
                    if (!e.target.classList.contains('delete-fav')) {
                        document.getElementById('prompt').textContent = text;
                        document.getElementById('hint').textContent = hint;
                    }
                };
                list.appendChild(item);
            });
        }
        
        function saveFavorite() {
            const text = document.getElementById('prompt').textContent;
            const hint = document.getElementById('hint').textContent;
            const placeholders = [uiStrings.zh.defaultPrompt, uiStrings.en.defaultPrompt];
            if (text && !placeholders.includes(text)) {
                const favs = JSON.parse(localStorage.getItem('artPromptFavs') || '[]');
                const newFav = { text, hint };
                const exists = favs.some(f => (typeof f === 'string' ? f === text : f.text === text && (f.hint || '') === (hint || '')));
                if (!exists) {
                    favs.push(newFav);
                    localStorage.setItem('artPromptFavs', JSON.stringify(favs));
                    loadFavorites();
                }
            }
        }
        
        function deleteFav(index) {
            const favs = JSON.parse(localStorage.getItem('artPromptFavs') || '[]');
            favs.splice(index, 1);
            localStorage.setItem('artPromptFavs', JSON.stringify(favs));
            loadFavorites();
        }
        
        // HK Time
        function updateTime() {
            const now = new Date();
            const hkTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Hong_Kong' }));
            document.getElementById('hkTime').textContent = hkTime.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        }
        updateTime();
        setInterval(updateTime, 60000);
        
        updateUILabels();
        loadFavorites();
    </script>
</body>
</html>
